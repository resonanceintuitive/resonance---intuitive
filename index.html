<body>
    <div class="container">
        <div class="header">
            <h1>🚩 Red Flag Famille</h1>
            <p>Détecte les dynamiques toxiques cachées : manipulation parentale, parentification, favoritisme, culpabilité familiale.</p>
        </div>
        
        <div class="content">
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('assessment')">Évaluation</button>
                <button class="tab-button" onclick="switchTab('results')">Résultats</button>
                <button class="tab-button" onclick="switchTab('library')">Bibliothèque</button>
            </div>
            
            <div id="assessment" class="tab-content active">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="questionsContainer"></div>
                <div class="button-group" id="assessmentActions">
                    <button class="btn btn-primary" onclick="calculateResults()" id="submitBtn" style="display: none;">Voir mes résultats</button>
                    <button class="btn btn-secondary" onclick="clearAssessment()" id="clearBtn">Effacer mes réponses</button>
                </div>
            </div>
            
            <div id="results" class="tab-content">
                <div id="resultsContainer" class="empty-state">
                    <p>Complète l'évaluation pour voir tes résultats.</p>
                </div>
                <div class="button-group" style="margin-top: 20px;">
                    <button class="btn btn-secondary" onclick="switchTab('assessment')">Revenir à l'évaluation</button>
                    <button class="btn btn-secondary" onclick="clearAssessment()">Effacer mes réponses</button>
                    <button class="btn btn-secondary" onclick="switchTab('library')">Explorer la Bibliothèque</button>
                </div>
            </div>
            
            <div id="library" class="tab-content">
                <div id="libraryView"></div>
                <div id="articleView" style="display: none;" class="article-view"></div>
            </div>
        </div>
    </div>
    
    <script>
        const questions = [
            {category: 'Manipulation parentale', id: 'manipulation', questions: [{text: "Un parent utilise mes secrets ou vulnérabilités contre moi lors de conflits", weight: 3}, {text: "Un parent me dit que je suis 'la seule qui comprenne' ou 'la seule en qui il peut compter'", weight: 3}, {text: "Un parent me reproche de ressembler à l'autre parent ou utilise mes proches pour me contrôler", weight: 2}, {text: "Je me sens obligée de répondre très rapidement à ses appels, visites ou messages, sinon il s'énerve", weight: 2}, {text: "Un parent dit que je suis 'égoïste' ou 'ingrate' quand je mets des limites", weight: 2}]},
            {category: 'Parentification et rôle inversé', id: 'parentification', questions: [{text: "J'ai été l'oreille émotionnelle d'un parent quand j'étais enfant ou adolescente", weight: 3}, {text: "J'ai appris à nier mes besoins pour calmer un parent ou le protéger", weight: 3}, {text: "Un parent me confie ses peines amoureuses ou professionnelles comme à une amie", weight: 2}, {text: "Je me sens responsable des émotions d'un parent encore aujourd'hui", weight: 2}, {text: "Je n'ose pas dire non à un parent sans me sentir immédiatement coupable", weight: 2}]},
            {category: 'Favoritisme familial', id: 'favoritisme', questions: [{text: "Je me sens moins aimée que ma fratrie, ou c'est l'inverse et j'en culpabilise", weight: 3}, {text: "Un parent compare mon succès, mon apparence ou ma personnalité à celle de mes frères et sœurs", weight: 2}, {text: "Ma fratrie me tient responsable de ce qu'un parent a donné à l'autre", weight: 2}, {text: "J'ai une relation très proche avec un parent et distante avec l'autre", weight: 2}, {text: "Le préféré d'un parent change selon son humeur, ce qui me déstabilise", weight: 1}]},
            {category: 'Culpabilité familiale', id: 'culpabilite', questions: [{text: "Je porte la souffrance d'un parent sans qu'il l'ait explicitement demandé", weight: 3}, {text: "Je me sens coupable de mon bien-être ou de mes succès face aux difficultés d'un parent", weight: 3}, {text: "Un parent utilise des phrases comme 'Après tout ce que j'ai fait pour toi' ou 'je me suis sacrifiée'", weight: 2}, {text: "Je rembourse émotionnellement une dette familiale que je n'ai pas créée", weight: 2}, {text: "La culpabilité m'empêche de prendre mes propres décisions", weight: 2}]},
            {category: 'Fratrie et alliances toxiques', id: 'fratrie', questions: [{text: "Ma fratrie me blâme pour ma relation avec un parent ou me juge de ne pas assez faire pour lui", weight: 2}, {text: "J'ai dû jouer le rôle de parent auprès de mes frères et sœurs plus jeunes", weight: 2}, {text: "Ma fratrie rivalise avec moi pour l'attention ou l'affection d'un parent", weight: 2}, {text: "Je ne peux pas parler librement à ma fratrie de ce qui se passe vraiment en famille", weight: 1}, {text: "Un enfant est clairement préféré et cela crée une compétition entre nous", weight: 2}]}
        ];

        /*
        RED FLAG FAMILLE — BIBLIOTHÈQUE ACTIVE
        Règle simple, parce qu'apparemment même le code a besoin d'être recadré :
        - Ne mettre ici QUE les articles réellement complets.
        - Pour ajouter un article hebdomadaire :
          1) Ajouter son titre + intro dans archetypes.
          2) Ajouter son contenu complet dans articleContents avec la clé exacte : archetype_index.
          Exemple : enfant_parent_1, enfant_parent_2, etc.
        - Ne jamais remettre de cadenas, de faux article ou de "bientôt disponible" dans la bibliothèque visible.
        */
        const archetypes = {
            'enfant_parent': {
                name: 'L\'enfant parent',
                articles: [
                    {title: 'Pourquoi tu culpabilises autant', intro: 'Tu as grandi en pensant que tes besoins étaient une forme d\'égoïsme. Chaque fois que tu penses à toi, une petite voix te dit que tu devrais penser aux autres d\'abord. Cette culpabilité n\'a pas commencé avec toi. Elle a commencé quand on t\'a donné l\'impression que ton rôle était de prendre soin, pas d\'être prise soin.'}
                ]
            },
            'enfant_sauveur': {
                name: 'L\'enfant sauveur',
                articles: [
                    {title: 'Pourquoi tu anticipes tout', intro: 'Ton cerveau fonctionne en mode alerte permanente. Tu lis entre les lignes, tu devines les colères avant qu\'elles arrivent, tu arranges les choses avant qu\'elles explosent. Ce radar émotionnel t\'a probablement sauvée enfant. Aujourd\'hui, il te tue.'}
                ]
            },
            'enfant_oublie': {
                name: 'L\'enfant oublié',
                articles: [
                    {title: 'Pourquoi tu as du mal à recevoir', intro: 'Les compliments te mettent mal à l\'aise. L\'amour aussi. L\'attention, la générosité, l\'aide, tout ça semble destiné à quelqu\'un d\'autre. Pas à toi. Tu es habituée à te débrouiller seule. Recevoir, c\'est baisser ta garde. Et tu n\'as jamais appris à faire ça.'}
                ]
            },
            'bouc_emissaire': {
                name: 'Le bouc émissaire',
                articles: [
                    {title: 'Pourquoi tu te justifies sans arrêt', intro: 'Tu as appris à te défendre avant même qu\'on t\'accuse. Parce qu\'on t\'a tellement blâmée qu\'il te semble normal d\'être suspecte. Tu expliques, tu justifies, tu t\'excuses même quand tu n\'as rien fait. Parce que tu préfères te battre que de te sentir impuissante.'}
                ]
            },
            'enfant_invisible': {
                name: 'L\'enfant invisible',
                articles: [
                    {title: 'Pourquoi tu te débrouilles toujours seule', intro: 'Tu as appris très tôt qu\'il ne fallait compter que sur toi. Peut-être qu\'on était absent, peut-être qu\'on était trop occupé, peut-être qu\'on ne remarquait pas. Alors tu as appris à survivre seule. Et maintenant, même quand on te propose de l\'aide, tu ne sais pas comment l\'accepter.'}
                ]
            },
            'enfant_prefere': {
                name: 'L\'enfant préféré',
                articles: [
                    {title: 'Pourquoi tu culpabilises autant', intro: 'Être préférée a un prix. Tu sens la tension dans la fratrie. Tu vois le regard des autres enfants. Et tu te sens coupable d\'avoir reçu ce qu\'ils n\'ont pas. Cette culpabilité, tu la portes. Elle est devenue une partie de qui tu es.'}
                ]
            },
            'enfant_mediateur': {
                name: 'L\'enfant médiateur',
                articles: [
                    {title: 'Pourquoi tu veux toujours réparer les autres', intro: 'Tu as été habituée à calmer les tempêtes. À lire les silences, à arranger les conflits avant qu\'ils ne deviennent des catastrophes. C\'était ton rôle. Et maintenant, même à l\'âge adulte, tu fais ça automatiquement. Sans qu\'on te le demande.'}
                ]
            }
        };

        let answers = {};
        let currentArchetype = null;
        
        const articleContents = {
            'enfant_parent_0': `Tu ne culpabilises pas parce que tu es gentille. Tu ne culpabilises pas parce que tu as bon cœur. Tu culpabilises parce qu'on t'a appris très tôt que penser à toi était un problème.

Peut-être que tu étais celle qui écoutait. Celle qui calmait. Celle qui comprenait. Celle qui ne faisait pas de vagues. Celle qui entendait les problèmes des adultes alors qu'elle n'avait même pas l'âge de les porter.

Et sans t'en rendre compte, tu as grandi avec une idée étrange.

Les autres d'abord. Toi après.

Alors aujourd'hui, quand tu annules un rendez-vous parce que tu es fatiguée, tu culpabilises. Quand tu dis non, tu culpabilises. Quand tu dépenses de l'argent pour toi, tu culpabilises. Quand tu te reposes, tu culpabilises. Quand tu n'as pas envie de répondre au téléphone, tu culpabilises. Et parfois tu culpabilises même d'aller bien.

Tu connais peut-être cette scène.

Tu es enfin tranquille chez toi. Tu t'assois. Tu allumes une série. Et au lieu de profiter, ton cerveau cherche quelqu'un qui pourrait avoir besoin de toi. Ta mère. Ton père. Tes enfants. Ton compagnon. Une amie.

Comme si être en paix était presque dangereux.

Parce qu'au fond, tu as appris qu'il fallait être utile pour être aimée.

Alors tu rends service. Tu aides. Tu rassures. Tu écoutes. Tu portes. Et les autres finissent par trouver ça normal. Parce que ce qui est offert tous les jours finit par devenir invisible.

Le problème, c'est que personne ne voit ce que ça te coûte.

On voit la femme solide. On ne voit pas celle qui s'endort épuisée. On voit celle qui gère. On ne voit pas celle qui rêve qu'on lui demande enfin : « Et toi, ça va ? »

Alors tu continues. Tu fais bonne figure. Tu souris. Tu dis : « Ça va. »

Alors que parfois tu as juste envie que quelqu'un prenne un peu le relais. Mais demander te met mal à l'aise. Parce que recevoir n'a jamais été naturel pour toi. Tu préfères donner. Parce que donner te donne une place. Parce que recevoir te rend vulnérable.

Alors tu attires souvent les mêmes profils. Des gens perdus. Des gens blessés. Des gens qui ont besoin d'aide. Des gens qui prennent beaucoup.

Pas parce que tu les cherches. Mais parce que tu sais faire ça. Tu sais réparer. Tu sais comprendre. Tu sais attendre. Tu sais pardonner.

Et parfois, tu restes dans des relations qui te vident parce qu'une partie de toi croit encore que l'amour se mérite. Qu'il faut faire des efforts. Comprendre. Supporter. Sauver.

Tu sais ce qui est injuste ?

C'est que personne ne t'a demandé si tu voulais ce rôle. Tu l'as pris parce qu'il fallait bien que quelqu'un le fasse. Parce qu'enfant, tu n'avais pas le choix.

Mais aujourd'hui, tu n'es plus cette enfant.

Tu peux continuer à aimer sans porter tout le monde. Tu peux dire non sans être mauvaise. Tu peux être fatiguée sans être égoïste. Tu peux avoir besoin d'aide sans être faible. Tu peux laisser les autres gérer leurs émotions. Tu peux arrêter de sauver ceux qui ne veulent pas être sauvés.

Et surtout, tu peux découvrir quelque chose que beaucoup d'enfants parents mettent des années à comprendre :

Tu n'es pas née pour réparer tout le monde.

Tu avais le droit d'être une enfant. Et aujourd'hui encore, tu as le droit d'être simplement une femme qui n'a pas besoin de mériter sa place, son repos ou son bonheur.

Tu n'as rien à rembourser. Tu n'as pas de dette invisible. Tu n'as pas à gagner le droit d'exister.

Tu peux commencer à vivre sans porter le monde sur ton dos. Même si, au début, ça te paraît étrange. Même si une partie de toi culpabilise encore.

Parce que cette culpabilité n'est pas ton identité. C'est juste une vieille habitude. Et une habitude, ça peut se désapprendre.`,
            'bouc_emissaire_0': `Tu connais peut-être cette sensation étrange.

Personne ne t'a encore reproché quoi que ce soit, mais tu es déjà en train d'expliquer.

Tu détailles.

Tu argumentes.

Tu précises.

Tu cherches les bons mots.

Tu as peur qu'on te comprenne mal.

Tu as peur qu'on pense que tu es méchante.

Tu as peur qu'on te fasse passer pour ce que tu n'es pas.

Alors tu anticipes.

Tu te défends avant même d'être attaquée.

Et parfois, tu t'excuses alors que tu n'as rien fait.

Tu dis :

« Désolée de te déranger. »

« Désolée, je voulais juste dire que... »

« Désolée, mais je pense que... »

Comme si avoir une opinion était déjà une faute.

Comme si exister demandait une autorisation.

Tu sais ce qu'il y a de fou ?

Les autres ne se justifient pas autant.

Ils disent.

Ils décident.

        function setAnswer(qId, value) {
            answers[qId] = value;
            localStorage.setItem('redFlagFamilleAnswers', JSON.stringify(answers));
            renderQuestions();
        }
        
        function updateProgress() {
            const totalQuestions = questions.reduce((sum, s) => sum + s.questions.length, 0);
            const validQuestionIds = questions.flatMap(section => section.questions.map((_, idx) => `${section.id}_${idx}`));
            const answered = validQuestionIds.filter(qId => Object.prototype.hasOwnProperty.call(answers, qId)).length;
            const percent = (answered / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.style.display = answered === totalQuestions ? 'inline-block' : 'none';
            }
        }
        
        function calculateScores() {
            const scores = {};
            questions.forEach(section => {
                let sectionScore = 0, maxScore = 0;
                section.questions.forEach((q, idx) => {
                    const qId = `${section.id}_${idx}`;
                    const answer = Object.prototype.hasOwnProperty.call(answers, qId) ? answers[qId] : 0;
                    sectionScore += (answer * q.weight);
                    maxScore += (3 * q.weight);
                });
                scores[section.id] = {raw: sectionScore, max: maxScore, percent: Math.round((sectionScore / maxScore) * 100)};
            });
            return scores;
        }
        
        function getScoreColor(percent) {
            if (percent < 20) return {bg: '#EAF3DE', border: '#639922', fill: '#639922', text: '#3b6d11'};
            if (percent < 40) return {bg: '#FAEEDA', border: '#ba7517', fill: '#ba7517', text: '#854f0b'};
            if (percent < 60) return {bg: '#FAECE7', border: '#993c1d', fill: '#993c1d', text: '#712b13'};
            return {bg: '#FCEBEB', border: '#e24b4a', fill: '#e24b4a', text: '#a32d2d'};
        }

                'favoritisme': {low: 'Équité perçue', med: 'Comparaisons fréquentes', high: 'Favoritisme destructeur'},
                'culpabilite': {low: 'Autonomie émotionnelle', med: 'Culpabilité modérée', high: 'Culpabilité transgénérationnelle'},
                'fratrie': {low: 'Fratrie plutôt soutenante', med: 'Tensions modérées', high: 'Alliance familiale douloureuse'}

            let level = 'low';
            if (percent >= 60) level = 'high';
            else if (percent >= 35) level = 'med';

                    <div class="cta-box">
                        <h3>Tu veux aller plus loin ?</h3>
                        <p>Ce test te donne une première lecture. La bibliothèque te permet ensuite de comprendre ton rôle familial en profondeur. Si tu veux une analyse personnalisée de ton histoire, de tes schémas et de ce que ton corps raconte, tu peux réserver une consultation.</p>
                        <a href="https://www.resonanceintuitive.com/consultations" class="cta-button" target="_blank">Prendre rendez-vous</a>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-primary" onclick="switchTab('library')">Lire mon article dans la bibliothèque</button>
                        <button class="btn btn-secondary" onclick="resetAssessment()">Effacer mes réponses</button>
                    </div>`;

            document.getElementById('resultsContainer').innerHTML = html;
            switchTab('results');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            const activeButton = document.querySelector(`.tab-button[onclick="switchTab('${tab}')"]`);
            if (activeButton) activeButton.classList.add('active');
        }
        
        function clearAssessment() {
            if (confirm('Effacer toutes tes réponses ?')) {
                answers = {};
                localStorage.removeItem('redFlagFamilleAnswers');
                renderQuestions();
                switchTab('assessment');
            }
        }

        function resetAssessment() {
            clearAssessment();
        }
        
        initializeQuestions();
    </script>
</body>
</html>
